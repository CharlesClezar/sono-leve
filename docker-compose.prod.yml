name: sono-leve

services:
  api:
    container_name: sono-leve-api
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${API_PORTA:-5000}:8080"
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Segredo: ${JWT_SEGREDO}
      Jwt__ExpiracaoMinutos: ${JWT_EXPIRACAO_MINUTOS:-15}
      Jwt__ExpiracaoRefreshDias: ${JWT_EXPIRACAO_REFRESH_DIAS:-7}
      Cors__Origens: ${CORS_ORIGENS}
    volumes:
      - ./data/imagens:/app/wwwroot/imagens/produtos
    networks:
      - default
      - infra
    restart: unless-stopped

  frontend:
    container_name: sono-leve-frontend
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:8080
    ports:
      - "${FRONTEND_PORTA:-3000}:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped

networks:
  infra:
    external: true
