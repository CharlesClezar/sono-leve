name: sono-leve

services:
  postgres:
    image: postgres:16
    container_name: sono-leve-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: sono-leve-api
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${API_PORTA:-5000}:8080"
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Host do banco vem do .env: 'postgres' (container próprio) por padrão, ou
      # 'host.docker.internal' quando gerenciado pelo Central (Postgres compartilhado).
      ConnectionStrings__Default: "Host=${POSTGRES_HOST:-postgres};Port=${POSTGRES_PORT:-5432};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Segredo: ${JWT_SEGREDO}
      Jwt__ExpiracaoMinutos: ${JWT_EXPIRACAO_MINUTOS:-15}
      Jwt__ExpiracaoRefreshDias: ${JWT_EXPIRACAO_REFRESH_DIAS:-7}
      Cors__Origens: ${CORS_ORIGENS}
    volumes:
      - ./data/imagens/produto:/app/wwwroot/imagens/produto
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    container_name: sono-leve-frontend
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:8080
    ports:
      - "${FRONTEND_PORTA:-3000}:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
